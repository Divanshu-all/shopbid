services:
  - type: web
    name: shopbid-server
    env: node
    rootDir: server
    buildCommand: npm install --legacy-peer-deps
    startCommand: node server.js

  - type: static
    name: shopbid-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html